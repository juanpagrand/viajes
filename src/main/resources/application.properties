spring.application.name=viajes

#Base de datos
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/viajes}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

#Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Archivos subidos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#Vipps
vipps.client-id=${VIPPS_CLIENT_ID:demo-client-id}
vipps.client-secret=${VIPPS_CLIENT_SECRET:demo-client-secret}
vipps.subscription-key=${VIPPS_SUBSCRIPTION_KEY:demo-subscription-key}
vipps.merchant-serial-number=${VIPPS_MSN:123456}
vipps.webhook-secret=${VIPPS_WEBHOOK_SECRET:demo-webhook-secret}
app.base-url=${APP_BASE_URL:http://localhost:8080}