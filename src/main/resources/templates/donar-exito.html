<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donación Exitosa - El Loco David</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/barco.css}">
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body class="antialiased selection:bg-primaryLight selection:text-background relative min-h-screen flex flex-col bg-background">
    <div class="aurora-glow"></div>

    <nav class="fixed w-full z-50 glass-nav transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center p-0.5 shadow-lg shadow-primary/20">
                    <div class="w-full h-full bg-background rounded-full flex items-center justify-center">
                        <i data-lucide="ship" class="text-primary w-5 h-5"></i>
                    </div>
                </div>
                <div class="font-bold text-xl tracking-wide text-white">EL LOCO <span class="text-primary font-light">DAVID</span></div>
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-32 pb-20 px-4 relative z-20">
        <div class="w-full max-w-md">
            <div class="bento-box p-10 text-center relative overflow-hidden border-t-4 border-t-emerald-500">
                <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-emerald-500/30">
                    <i data-lucide="check-circle-2" class="w-10 h-10 text-emerald-400"></i>
                </div>
                
                <h1 class="text-3xl font-bold text-white mb-2">¡Tusen Takk!</h1>
                <h2 class="text-xl text-emerald-400 mb-6 font-medium">(¡Muchas Gracias!)</h2>
                
                <p class="text-slate-300 mb-6 leading-relaxed">
                    Hemos recibido tu donación correctamente. Tu apoyo incondicional es el motor que nos impulsa a seguir explorando.
                </p>
                
                <div class="bg-surfaceLight p-4 rounded-xl border border-white/5 mb-8">
                    <span class="block text-xs text-slate-500 uppercase tracking-widest mb-1">Referencia</span>
                    <span class="font-mono text-white tracking-wider" th:text="${orderId}">EL-LOCO-XXXXX</span>
                </div>

                <a href="/" class="btn-aurora w-full flex justify-center py-4 text-lg">
                    Volver al inicio
                </a>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        // Disparar confeti al cargar la página
        window.onload = function() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#10b981', '#3b82f6', '#ff5b24']
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#10b981', '#3b82f6', '#ff5b24']
                }));
            }, 250);
        };
    </script>
</body>
</html>
