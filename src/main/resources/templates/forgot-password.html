<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Loco David | Recuperar Clave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/barco.css}">
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body
    class="antialiased selection:bg-primaryLight selection:text-background min-h-screen flex items-center justify-center relative overflow-hidden bg-background">

    <!-- Luz ambiental simulando Aurora Boreal -->
    <div
        class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-primary/20 rounded-full blur-[120px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-accent/10 rounded-full blur-[120px] pointer-events-none">
    </div>

    <!-- Navegación Mínima para regresar al inicio -->
    <nav class="absolute top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a th:href="@{/}" class="flex items-center gap-3 group">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center p-0.5 shadow-lg group-hover:shadow-primary/40 transition-shadow">
                    <div class="w-full h-full bg-background rounded-full flex items-center justify-center">
                        <i data-lucide="ship"
                            class="text-primary w-5 h-5 transition-transform group-hover:rotate-12"></i>
                    </div>
                </div>
                <div class="font-bold text-xl tracking-wide text-white">EL LOCO <span
                        class="text-primary font-light">DAVID</span></div>
            </a>
            <a th:href="@{/login}"
                class="text-slate-400 hover:text-white transition-colors flex items-center gap-2 text-sm font-medium">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver al Login
            </a>
        </div>
    </nav>

    <!-- Contenedor del Formulario -->
    <div class="relative z-10 w-full max-w-md px-6">
        <div class="glass-panel p-8 sm:p-10 rounded-3xl w-full relative overflow-hidden">
            <!-- Detalles decorativos -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-bl-full blur-2xl"></div>

            <div class="text-center mb-8 relative z-10">
                <h2 class="text-3xl font-bold text-white mb-2">Recuperar Clave</h2>
                <p class="text-slate-400 text-sm">Introduce tu correo para solicitar un código de confirmación</p>
            </div>

            <!-- Mostrar mensaje de error -->
            <div th:if="${error}"
                class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl mb-6 flex items-center gap-3 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
                <p th:text="${error}"></p>
            </div>

            <form th:action="@{/forgot-password}" method="post" class="space-y-5 relative z-10">
                <!-- Campo Email -->
                <div>
                    <label for="email"
                        class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                        <i data-lucide="mail" class="w-4 h-4 text-slate-400"></i> Correo Electrónico
                    </label>
                    <input type="email" id="email" name="email" required
                        class="w-full input-dark px-4 py-3 rounded-xl placeholder-slate-600 focus:ring-0"
                        placeholder="tu.correo@ejemplo.com">
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full bg-primary hover:bg-primaryLight text-background font-bold px-4 py-3 rounded-xl transition-all duration-300 transform active:scale-[0.98] shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(52,211,153,0.5)] flex justify-center items-center gap-2 mt-4">
                    Enviar Código <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-slate-400 relative z-10">
                ¿Recordaste tu contraseña?
                <a th:href="@{/login}"
                    class="text-primaryLight font-semibold hover:text-white transition-colors ml-1 border-b border-primaryLight/30 hover:border-white">Inicia sesión</a>
            </div>
        </div>
    </div>

    <!-- Script de Traducción -->
    <script th:src="@{/js/translations.js}"></script>

    <!-- Inicializar iconos -->
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
