<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Loco David | Editar Sponsor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/barco.css}">
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body class="antialiased selection:bg-accent selection:text-white min-h-screen bg-background relative flex flex-col items-center justify-center">

    <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-accent/5 to-background pointer-events-none z-0"></div>

    <div class="w-full max-w-lg relative z-10 p-6">
        <a th:href="@{/admin/sponsors}" class="inline-flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-6 font-medium">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver a Sponsors
        </a>

        <div class="glass-panel p-8 md:p-10 rounded-3xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-bl-full pointer-events-none"></div>

            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 rounded-xl bg-primary/20 border border-primary/30 flex items-center justify-center shrink-0">
                    <i data-lucide="edit" class="text-primary w-6 h-6"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-white">Editar Sponsor</h2>
                    <p class="text-sm text-slate-400">Modifica los datos del patrocinador</p>
                </div>
            </div>

            <form th:action="@{/admin/sponsors/editar/{id}(id=${sponsor.id})}" th:object="${sponsor}" method="post" enctype="multipart/form-data" class="space-y-5">
                
                <div class="mb-6 flex justify-center">
                    <div class="h-24 w-48 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center overflow-hidden">
                        <img th:if="${sponsor.logoPath != null}" th:src="${sponsor.logoPath}" alt="Logo Actual" class="h-full object-contain">
                        <span th:unless="${sponsor.logoPath != null}" class="text-slate-500 text-sm">Sin Logo</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-slate-400 mb-1 ml-1 font-medium">Descripción / Nombre</label>
                    <input type="text" th:field="*{descripcion}" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                </div>
                
                <div>
                    <label class="block text-sm text-slate-400 mb-1 ml-1 font-medium">Actualizar Logo (opcional)</label>
                    <input type="file" name="fotoArchivo" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-slate-300 focus:outline-none focus:border-primary transition-all file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primaryLight hover:file:bg-primary/20 cursor-pointer">
                    <p class="text-xs text-slate-500 mt-2 ml-1">Deja esto en blanco si quieres mantener el logo actual.</p>
                </div>

                <div class="pt-4 mt-6 border-t border-white/10">
                    <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-primary to-primaryLight hover:from-primaryLight hover:to-primary text-background font-bold tracking-wide shadow-lg shadow-primary/20 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
