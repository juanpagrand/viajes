<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donar - El Loco David</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/barco.css}">
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body class="antialiased selection:bg-primaryLight selection:text-background relative min-h-screen flex flex-col bg-background">
    <!-- Luz ambiental -->
    <div class="aurora-glow"></div>

    <nav class="fixed w-full z-50 glass-nav transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center p-0.5 shadow-lg shadow-primary/20">
                    <div class="w-full h-full bg-background rounded-full flex items-center justify-center">
                        <i data-lucide="ship" class="text-primary w-5 h-5"></i>
                    </div>
                </div>
                <div class="font-bold text-xl tracking-wide text-white">EL LOCO <span class="text-primary font-light">DAVID</span></div>
            </a>
            <div>
                <a href="/" class="text-slate-300 hover:text-white transition-colors flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-32 pb-20 px-4 relative z-20">
        <div class="w-full max-w-lg">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#ff5b24]/20 text-[#ff5b24] mb-4 border border-[#ff5b24]/30">
                    <i data-lucide="heart-handshake" class="w-8 h-8"></i>
                </div>
                <h1 class="text-4xl font-bold text-white mb-3">Apoya la Expedición</h1>
                <p class="text-slate-300">Las futuras aventuras dependen de tripulantes y donantes como tú.</p>
            </div>

            <div class="bento-box p-8 border-t-4 border-t-[#ff5b24]">
                <form th:action="@{/donar/procesar}" method="post" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-4 text-center">Selecciona una cantidad a donar (NOK)</label>
                        
                        <div class="grid grid-cols-3 gap-4 mb-4">
                            <label class="cursor-pointer">
                                <input type="radio" name="amount" value="100" class="peer sr-only" required>
                                <div class="px-4 py-3 rounded-xl border border-white/10 bg-white/5 text-center text-white font-bold transition-all peer-checked:bg-[#ff5b24] peer-checked:border-[#ff5b24] peer-checked:shadow-lg peer-checked:shadow-[#ff5b24]/30 hover:border-white/30">
                                    100 kr
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="amount" value="500" class="peer sr-only" checked>
                                <div class="px-4 py-3 rounded-xl border border-white/10 bg-white/5 text-center text-white font-bold transition-all peer-checked:bg-[#ff5b24] peer-checked:border-[#ff5b24] peer-checked:shadow-lg peer-checked:shadow-[#ff5b24]/30 hover:border-white/30">
                                    500 kr
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="amount" value="1000" class="peer sr-only">
                                <div class="px-4 py-3 rounded-xl border border-white/10 bg-white/5 text-center text-white font-bold transition-all peer-checked:bg-[#ff5b24] peer-checked:border-[#ff5b24] peer-checked:shadow-lg peer-checked:shadow-[#ff5b24]/30 hover:border-white/30">
                                    1000 kr
                                </div>
                            </label>
                        </div>
                        
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="text-slate-400 font-bold">kr</span>
                            </div>
                            <input type="number" name="custom_amount" placeholder="Otra cantidad..." min="1" step="1"
                                class="w-full input-dark pl-12 pr-4 py-3 rounded-xl text-white placeholder-slate-500 border border-white/10 focus:border-[#ff5b24] focus:ring-1 focus:ring-[#ff5b24] transition-colors"
                                onchange="if(this.value){document.querySelectorAll('input[type=radio]').forEach(r=>r.checked=false); document.getElementById('amount-hidden').value=this.value;}">
                        </div>
                        <input type="hidden" id="amount-hidden" name="amount" value="500" disabled>
                    </div>

                    <div class="bg-surfaceLight p-4 rounded-xl border border-white/5 flex gap-3 items-start mt-8">
                        <i data-lucide="info" class="w-5 h-5 text-slate-400 shrink-0 mt-0.5"></i>
                        <p class="text-xs text-slate-400 leading-relaxed">
                            Serás redirigido de forma segura a Vipps para completar tu pago. Vipps es el método de pago más popular de Noruega.
                        </p>
                    </div>

                    <button type="submit" class="w-full bg-[#ff5b24] hover:bg-[#ff5b24]/90 text-white font-bold py-4 rounded-xl text-lg shadow-lg shadow-[#ff5b24]/30 transition-all flex items-center justify-center gap-3">
                        Continuar con Vipps <i data-lucide="external-link" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
            
            <div class="text-center mt-8">
                <!-- SVG Logo genérico de Vipps simulado -->
                <svg width="100" height="40" viewBox="0 0 100 40" class="mx-auto opacity-50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="40" rx="20" fill="#FF5B24"/>
                    <path d="M30 25C30 25 35 15 40 15C45 15 50 25 50 25M50 25C50 25 55 15 60 15C65 15 70 25 70 25" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        // Script para manejar radios vs custom input
        const radios = document.querySelectorAll('input[type="radio"][name="amount"]');
        const customInput = document.querySelector('input[name="custom_amount"]');
        const hiddenAmount = document.getElementById('amount-hidden');
        
        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                customInput.value = '';
                hiddenAmount.disabled = true; // El form enviará el value del radio
            });
        });
        
        customInput.addEventListener('input', (e) => {
            if(e.target.value) {
                radios.forEach(r => r.checked = false);
                hiddenAmount.disabled = false;
                hiddenAmount.value = e.target.value;
            } else {
                radios[1].checked = true; // Default 500
                hiddenAmount.disabled = true;
            }
        });
    </script>
</body>
</html>
