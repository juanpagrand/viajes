<!DOCTYPE html>
<html lang="no" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vipps - Betal</title>
    <!-- Tailwind CSS (usado solo para simular la interfaz sin añadir CSS externo) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FF5B24; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Tarjeta tipo móvil Vipps -->
    <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col relative">
        <div class="bg-[#FF5B24] p-6 text-center text-white relative h-32 flex items-center justify-center">
            <h1 class="text-3xl font-extrabold tracking-tighter">vipps</h1>
        </div>
        
        <div class="p-8 flex-grow flex flex-col text-center mt-[-30px] bg-white rounded-t-3xl relative z-10">
            <div class="w-16 h-16 bg-gray-100 rounded-full mx-auto flex items-center justify-center mb-4 border-4 border-white shadow-sm">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 8v8"></path>
                    <path d="M8 12h8"></path>
                </svg>
            </div>
            
            <p class="text-gray-500 font-medium mb-1">El Loco David</p>
            <h2 class="text-4xl font-bold text-gray-900 mb-6 tracking-tight"><span th:text="${amount}">500</span> kr</h2>
            
            <p class="text-sm text-gray-400 mb-8">Referencia: <span th:text="${orderId}" class="font-mono">EL-LOCO-1234</span></p>

            <div class="mt-auto space-y-4">
                <a th:href="@{/donar/exito(orderId=${orderId})}" class="block w-full bg-[#FF5B24] text-white font-bold text-lg py-4 rounded-full shadow-lg active:scale-95 transition-transform hover:bg-[#E04D1B]">
                    Betal (Simular Pago)
                </a>
                <a href="/donar" class="block w-full text-[#FF5B24] font-medium py-2 rounded-full hover:bg-orange-50 transition-colors">
                    Avbryt (Cancelar)
                </a>
            </div>
        </div>
    </div>
    
    <div class="text-white/60 text-xs mt-6 text-center max-w-xs">
        Esto es una simulación del flujo de pago de Vipps para propósitos de demostración.
    </div>

</body>
</html>
