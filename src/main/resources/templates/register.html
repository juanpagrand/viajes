<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Loco David | Registro de Tripulante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/barco.css}">
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body
    class="antialiased selection:bg-primaryLight selection:text-background min-h-screen flex items-center justify-center relative overflow-hidden bg-background py-20">

    <!-- Iluminación del fondo -->
    <div
        class="absolute top-[10%] left-[-10%] w-[60%] h-[60%] bg-accent/15 rounded-full blur-[140px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/15 rounded-full blur-[120px] pointer-events-none">
    </div>

    <!-- Navegación -->
    <nav class="absolute top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a th:href="@{/}" class="flex items-center gap-3 group">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center p-0.5 shadow-lg group-hover:shadow-primary/40 transition-shadow">
                    <div class="w-full h-full bg-background rounded-full flex items-center justify-center">
                        <i data-lucide="ship"
                            class="text-primary w-5 h-5 transition-transform group-hover:rotate-12"></i>
                    </div>
                </div>
                <div class="font-bold text-xl tracking-wide text-white">EL LOCO <span
                        class="text-primary font-light">DAVID</span></div>
            </a>
            <a th:href="@{/}"
                class="text-slate-400 hover:text-white transition-colors flex items-center gap-2 text-sm font-medium">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver al Inicio
            </a>
        </div>
    </nav>

    <!-- Contenedor del Formulario -->
    <div class="relative z-10 w-full max-w-md px-6">
        <div class="glass-panel p-8 sm:p-10 rounded-3xl w-full relative overflow-hidden">
            <!-- Detalles decorativos -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-accent/10 rounded-bl-full blur-2xl"></div>

            <div class="text-center mb-8 relative z-10">
                <div
                    class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="user-plus" class="text-accent w-7 h-7"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">Unirse a la Flota</h2>
                <p class="text-slate-400 text-sm">Crea tu cuenta de tripulante</p>
            </div>

            <!-- Error message if email exists -->
            <div th:if="${param.error}"
                class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl mb-6 flex items-center gap-3 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
                <p>El correo ingresado ya está en uso. Usa otro o inicia sesión.</p>
            </div>

            <!-- Success message -->
            <div th:if="${param.success}"
                class="bg-primary/10 border border-primary/30 text-primaryLight px-4 py-3 rounded-xl mb-6 flex items-center gap-3 text-sm text-center">
                <i data-lucide="check-circle" class="w-6 h-6 shrink-0"></i>
                <div>
                    <h4 class="font-bold">¡Registro Exitoso!</h4>
                    <p class="mt-1 text-xs opacity-80">Tu cuenta ha sido creada. <a th:href="@{/login}"
                            class="underline font-semibold text-white">Inicia sesión</a> para continuar.</p>
                </div>
            </div>

            <form th:action="@{/register/save}" th:object="${user}" method="post" class="space-y-5 relative z-10">

                <!-- Validación de errores integrados -->
                <div th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="text-red-400 text-xs"></div>
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-400 text-xs"></div>

                <!-- Campo Nombre -->
                <div>
                    <label for="nombre" class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4 text-slate-400"></i> Nombre Completo
                    </label>
                    <input type="text" id="nombre" th:field="*{nombre}" required
                        class="w-full input-dark px-4 py-3 rounded-xl placeholder-slate-600 focus:ring-0"
                        placeholder="Capitán Ahab">
                </div>

                <!-- Campo Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                        <i data-lucide="mail" class="w-4 h-4 text-slate-400"></i> Correo Electrónico
                    </label>
                    <input type="email" id="email" th:field="*{email}" required
                        class="w-full input-dark px-4 py-3 rounded-xl placeholder-slate-600 focus:ring-0"
                        placeholder="tu.correo@ejemplo.com">
                </div>

                <!-- Campo Password -->
                <div>
                    <label for="password"
                        class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                        <i data-lucide="lock" class="w-4 h-4 text-slate-400"></i> Contraseña
                    </label>
                    <input type="password" id="password" th:field="*{password}" required
                        class="w-full input-dark px-4 py-3 rounded-xl placeholder-slate-600 focus:ring-0"
                        placeholder="Mínimo 8 caracteres">
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full bg-accent hover:bg-blue-400 text-white font-bold px-4 py-3 rounded-xl transition-all duration-300 transform active:scale-[0.98] shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:shadow-[0_0_25px_rgba(96,165,250,0.5)] flex justify-center items-center gap-2 mt-4">
                    Completar Registro <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-slate-400 relative z-10">
                ¿Ya eres parte de la expedición?
                <a th:href="@{/login}"
                    class="text-accent font-semibold hover:text-white transition-colors ml-1 border-b border-accent/30 hover:border-white">Inicia
                    Sesión</a>
            </div>
        </div>
    </div>

    <!-- Inicializar iconos -->
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
