<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Rutas/Destinos | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/barco.css}">
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="antialiased selection:bg-accent selection:text-white min-h-screen bg-background relative flex flex-col">

    <div class="absolute top-[0%] left-[-10%] w-[50%] h-[50%] bg-accent/15 rounded-full blur-[140px] pointer-events-none"></div>

    <nav class="sticky top-0 w-full z-50 glass-panel border-b-0 border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a th:href="@{/admin}" class="flex items-center justify-center w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 transition-colors border border-white/10">
                    <i data-lucide="arrow-left" class="w-5 h-5 text-slate-300"></i>
                </a>
                <div class="font-bold text-xl tracking-wide text-white ml-2">Gestión de <span class="text-accent font-light">Rutas</span></div>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-slate-300 hidden sm:inline-block">Capitán <span th:text="${admin.nombre}" class="text-white ml-1"></span></span>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-6 py-10 relative z-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Formulario Nuevo Destino -->
        <div class="lg:col-span-5 h-fit">
            <div class="glass-panel p-8 rounded-3xl sticky top-28">
                <div class="flex items-center gap-3 mb-6 pb-4 border-b border-white/10">
                    <i data-lucide="map-pin" class="text-accent w-6 h-6"></i>
                    <h2 class="text-xl font-bold text-white">Añadir Nueva Ruta</h2>
                </div>

                <div th:if="${param.successAdd}" class="bg-primary/10 border border-primary/30 text-primaryLight px-4 py-3 rounded-xl mb-6 flex items-center gap-3 text-sm">
                    <i data-lucide="check-circle" class="w-5 h-5 shrink-0"></i>
                    <p>Ruta añadida exitosamente.</p>
                </div>

                <form th:action="@{/admin/destinos/guardar}" method="post" enctype="multipart/form-data" th:object="${nuevoDestino}" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                            <i data-lucide="tag" class="w-4 h-4 text-slate-400"></i> Nombre de la Ruta / Destino
                        </label>
                        <input type="text" th:field="*{nombre}" required 
                               class="w-full input-dark px-4 py-3 rounded-xl placeholder-slate-600" placeholder="Ej: Antártida 2027">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                            <i data-lucide="align-left" class="w-4 h-4 text-slate-400"></i> Descripción
                        </label>
                        <textarea th:field="*{descripcion}" rows="3"
                               class="w-full input-dark px-4 py-3 rounded-xl placeholder-slate-600 resize-none font-sans" placeholder="Breve descripción de la ruta..."></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                            <i data-lucide="image" class="w-4 h-4 text-slate-400"></i> Imagen Destacada
                        </label>
                        <input type="file" name="fotoArchivo" accept="image/*" required
                               class="w-full input-dark px-4 py-3 rounded-xl file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-accent/20 file:text-accent hover:file:bg-accent/30 text-slate-300 cursor-pointer">
                    </div>

                    <!-- Input oculto para que por defecto sea true, aunque en la DB ya es true -->
                    <input type="hidden" th:field="*{activo}" value="true"/>

                    <button type="submit" class="w-full bg-accent hover:bg-blue-400 text-white font-bold px-6 py-3 rounded-xl transition-all duration-300 shadow-[0_0_20px_rgba(59,130,246,0.2)] hover:shadow-[0_0_25px_rgba(96,165,250,0.4)] flex items-center justify-center gap-2 mt-4">
                        <i data-lucide="plus" class="w-4 h-4"></i> Guardar Ruta
                    </button>
                </form>
            </div>
        </div>

        <!-- Listado de Destinos -->
        <div class="lg:col-span-7">
            <div class="glass-panel p-8 rounded-3xl h-full">
                <div class="flex items-center justify-between mb-8 pb-4 border-b border-white/10">
                    <div class="flex items-center gap-3">
                        <i data-lucide="list" class="text-accent w-6 h-6"></i>
                        <h2 class="text-2xl font-bold text-white">Rutas Registradas</h2>
                    </div>
                </div>

                <div th:if="${param.successStatus}" class="bg-primary/10 border border-primary/30 text-primaryLight px-4 py-3 rounded-xl mb-6 flex items-center gap-3 text-sm">
                    <i data-lucide="info" class="w-5 h-5 shrink-0"></i>
                    <p>Estado de la ruta actualizado.</p>
                </div>

                <div th:if="${param.successEdit}" class="bg-primary/10 border border-primary/30 text-primaryLight px-4 py-3 rounded-xl mb-6 flex items-center gap-3 text-sm">
                    <i data-lucide="check-circle" class="w-5 h-5 shrink-0"></i>
                    <p>Ruta actualizada correctamente.</p>
                </div>

                <div class="space-y-4">
                    <!-- Iterar sobre los destinos -->
                    <div th:each="destino : ${destinos}" 
                         class="bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col sm:flex-row items-center gap-6 hover:bg-white/10 transition-colors"
                         th:classappend="${!destino.activo} ? 'opacity-50 grayscale' : ''">
                        
                        <!-- Imagen -->
                        <div class="w-full sm:w-32 h-24 shrink-0 rounded-xl overflow-hidden bg-background/50 border border-white/5 flex items-center justify-center relative group">
                            <img th:if="${destino.imagenPath != null}" th:src="${destino.imagenPath}" class="w-full h-full object-cover">
                            <i th:unless="${destino.imagenPath != null}" data-lucide="image" class="w-6 h-6 text-slate-500"></i>
                            
                            <!-- Overlay de Inactivo -->
                            <div th:if="${!destino.activo}" class="absolute inset-0 bg-black/60 flex items-center justify-center">
                                <span class="text-[10px] font-bold text-white tracking-widest uppercase bg-red-500/80 px-2 py-1 rounded">Inactivo</span>
                            </div>
                        </div>

                        <!-- Detalles -->
                        <div class="flex-grow text-center sm:text-left w-full">
                            <h3 class="text-lg font-bold text-white mb-1" th:text="${destino.nombre}">Nombre de la Ruta</h3>
                            <p class="text-sm text-slate-400 line-clamp-2" th:text="${destino.descripcion}">Descripción de la ruta...</p>
                        </div>

                        <!-- Acciones -->
                        <div class="flex sm:flex-col gap-2 shrink-0 w-full sm:w-auto mt-4 sm:mt-0">
                            <!-- Botón Editar -->
                            <a th:href="@{/admin/destinos/editar/{id}(id=${destino.id})}" class="flex-1 sm:flex-none text-center px-4 py-2 bg-white/5 hover:bg-white/10 text-white text-sm font-medium rounded-lg border border-white/10 transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="edit" class="w-4 h-4"></i> Editar
                            </a>
                            
                            <!-- Botón Activar/Desactivar -->
                            <form th:action="@{/admin/destinos/toggle/{id}(id=${destino.id})}" method="post" class="flex-1 sm:flex-none">
                                <button type="submit" 
                                        th:classappend="${destino.activo} ? 'text-red-400 hover:bg-red-500/10 border-red-500/30' : 'text-primaryLight hover:bg-primary/10 border-primary/30'"
                                        class="w-full text-center px-4 py-2 bg-white/5 text-sm font-medium rounded-lg border transition-colors flex items-center justify-center gap-2">
                                    <i th:data-lucide="${destino.activo} ? 'eye-off' : 'eye'" class="w-4 h-4"></i>
                                    <span th:text="${destino.activo} ? 'Ocultar' : 'Mostrar'">Acción</span>
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- Si no hay destinos -->
                    <div th:if="${#lists.isEmpty(destinos)}" class="text-center py-12 border border-dashed border-white/10 rounded-2xl">
                        <i data-lucide="map" class="w-12 h-12 text-slate-500 mx-auto mb-3 opacity-50"></i>
                        <h3 class="text-lg font-medium text-slate-300">No hay rutas registradas</h3>
                        <p class="text-sm text-slate-500 mt-1">Añade tu primera ruta usando el formulario.</p>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
