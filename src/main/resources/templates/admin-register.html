<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Loco David | Crear Oficiales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/barco.css}">
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body
    class="antialiased selection:bg-accent selection:text-background min-h-screen flex items-center justify-center relative overflow-hidden bg-background py-20">

    <!-- Iluminación del fondo -->
    <div
        class="absolute top-[10%] left-[-10%] w-[60%] h-[60%] bg-accent/15 rounded-full blur-[140px] pointer-events-none">
    </div>

    <!-- Contenedor del Formulario -->
    <div class="relative z-10 w-full max-w-md px-6">
        <div class="glass-panel p-8 sm:p-10 rounded-3xl w-full relative overflow-hidden">
            <!-- Detalles decorativos -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-accent/10 rounded-bl-full blur-2xl"></div>

            <div class="text-center mb-8 relative z-10">
                <div
                    class="w-14 h-14 bg-accent/10 border border-accent/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="shield" class="text-accent w-7 h-7"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">Crear Nuevo Oficial</h2>
                <p class="text-slate-400 text-sm">Registro de cuenta con privilegios de Administrador</p>
            </div>

            <!-- Error message if email exists -->
            <div th:if="${param.error}"
                class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl mb-6 flex items-center gap-3 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
                <p>El correo ingresado ya está en uso en otra cuenta.</p>
            </div>

            <form th:action="@{/admin/register/save}" th:object="${adminDto}" method="post" class="space-y-5 relative z-10">

                <!-- Campo Nombre -->
                <div>
                    <label for="nombre" class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4 text-slate-400"></i> Nombre Completo
                    </label>
                    <input type="text" id="nombre" name="nombre" th:value="*{nombre}" required
                        class="w-full input-dark admin-input-focus px-4 py-3 rounded-xl placeholder-slate-600 focus:ring-0"
                        placeholder="Ej: Teniente Ripley">
                </div>

                <!-- Campo Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                        <i data-lucide="mail" class="w-4 h-4 text-slate-400"></i> Correo Electrónico
                    </label>
                    <input type="email" id="email" name="email" th:value="*{email}" required
                        class="w-full input-dark admin-input-focus px-4 py-3 rounded-xl placeholder-slate-600 focus:ring-0"
                        placeholder="oficial@ejemplo.com">
                </div>

                <!-- Campo Password -->
                <div>
                    <label for="password"
                        class="block text-sm font-medium text-slate-300 mb-1.5 flex items-center gap-2">
                        <i data-lucide="lock" class="w-4 h-4 text-slate-400"></i> Contraseña Maestra
                    </label>
                    <input type="password" id="password" name="password" th:value="*{password}" required
                        class="w-full input-dark admin-input-focus px-4 py-3 rounded-xl placeholder-slate-600 focus:ring-0"
                        placeholder="Mínimo 8 caracteres">
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full bg-accent hover:bg-blue-400 text-white font-bold px-4 py-3 rounded-xl transition-all duration-300 transform active:scale-[0.98] shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:shadow-[0_0_25px_rgba(96,165,250,0.5)] flex justify-center items-center gap-2 mt-4">
                    Registrar Autoridad <i data-lucide="check" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-slate-400 relative z-10">
                <a th:href="@{/admin}"
                    class="text-slate-500 font-semibold hover:text-white transition-colors ml-1 border-b border-slate-700 hover:border-white">
                    <i data-lucide="arrow-left" class="w-3 h-3 inline"></i> Cancelar y Volver
                </a>
            </div>
        </div>
    </div>

    <!-- Inicializar iconos -->
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
